<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shree Dhanlaxmi Traders</title>
    <style>
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Styles */ 
        header {
            background: #333;
            padding: 1rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: auto;
            padding: 0 20px;
        }

        .logo {
            color: white;
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 12px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffd700;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
        }

        .mobile-menu-btn span {
            display: block;
            width: 30px;
            height: 3px;
            background: white;
            margin: 6px 0;
        }

        /* Main Content */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding-top: 80px; /* Header space */
        }

        .login-form-section {
            background-color: #f5f5f5;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .login-btn {
            background-color: #f0a500;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        .login-btn:hover {
            background-color: #d18b00;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .container {
                padding: 0 16px;
            }
            .login-form-section {
                padding: 24px;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .logo {
                margin-bottom: 12px;
            }

            .mobile-menu-btn {
                display: block;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                right: 20px;
                background: #333;
                width: 220px;
                padding: 15px;
                border-radius: 5px;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            }

            .nav-links.active {
                display: flex;
            }

            .login-form-section {
                width: 100%;
                max-width: 100%;
                margin: 0 8px;
                padding: 22px;
            }

            .section-title {
                font-size: 22px;
            }

            .input-group input {
                font-size: 15px;
            }

            .login-btn {
                padding: 14px;
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 0.75rem;
            }

            .container {
                padding: 0 12px;
            }

            .logo {
                font-size: 1.3rem;
            }

            .nav-links {
                right: 12px;
                width: 100%;
                top: 56px;
            }

            .login-form-section {
                padding: 18px;
            }

            .section-title {
                font-size: 20px;
            }

            .input-group label {
                font-size: 13px;
            }

            .login-btn {
                font-size: 14px;
            }
        }

        /* Footer Styles */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">Shree Dhanlaxmi Traders</h1>
            <button class="mobile-menu-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="product.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section class="login-form-section">
            <h2 class="section-title">Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2025 Shree Dhanlaxmi Traders. All Rights Reserved.</p>
    </footer>

    <script>
        function toggleMenu() {
            document.querySelector(".nav-links").classList.toggle("active");
        }

        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            if (username === "sdt1234" && password === "sdt1234") {
                window.location.href = "dashboard.html";
            } else {
                alert("Invalid username or password!");
            }
        });
    </script>
</body>
</html>
