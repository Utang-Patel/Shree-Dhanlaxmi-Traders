<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }
        .container {
            position: relative;
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.12);
            width: min(520px, calc(100% - 40px));
        }
        h1 {
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 220px;
            margin: 12px auto;
            padding: 12px;
            font-size: 16px;
            text-decoration: none;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .back-btn {
            background-color: #6c757d;
            margin: 0;
            position: absolute;
            top: 20px;
            left: 20px;
            width: 42px;
            height: 42px;
            padding: 0;
            font-size: 18px;
            color: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:hover {
            background-color: #5a6268;
        }
        @media (max-width: 768px) {
            body {
                justify-content: flex-start;
                padding-top: 20px;
            }
            .container {
                width: calc(100% - 24px);
                padding: 24px;
                border-radius: 16px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .btn {
                width: 100%;
                max-width: 100%;
                font-size: 15px;
                margin: 10px 0;
            }
            .back-btn {
                top: 12px;
                left: 12px;
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn back-btn" onclick="goBack()" aria-label="Back">←</button>
        <h1>Shree Dhanlaxmi Traders</h1>
        <button class="btn" onclick="navigate('employee_erp.html')">Employee Details</button>
        <button class="btn" onclick="navigate('attendance.html')">Attendance</button>
    </div>

    <script>
        function navigate(page) {
            window.location.href = page;
        }
        function goBack() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
