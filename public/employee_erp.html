<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <style>
        .container {
            max-width: 1000px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 24px;
        }
        .page-title {
            margin: 0;
            text-align: center;
            font-size: 2rem;
        }
        .back-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            padding: 0;
            font-size: 1.1rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        .view-btn {
            background-color: #00bcd4;
            color: white;
            border: none;
            padding: 0;
            border-radius: 8px;
            cursor: pointer;
        }
        .table-responsive {
            overflow-x: auto;
        }
        @media (max-width: 992px) {
            .container {
                padding: 0 12px;
            }
            .row > div {
                flex: 0 0 100%;
                max-width: 100%;
            }
            .row > div button {
                width: 100%;
            }
        }
        @media (max-width: 576px) {
            body {
                padding-bottom: 20px;
            }
            .btn.btn-secondary {
                width: 100%;
                margin-bottom: 15px;
            }
            h2 {
                font-size: 1.5rem;
            }
            .form-control {
                margin-bottom: 10px;
            }
            .table {
                font-size: 14px;
            }
        }
    </style>
    <div class="container mt-5">
        <div class="page-header">
            <button class="view-btn back-btn" onclick="goBack()" aria-label="Back">←</button>
            <h1 class="page-title">Employee Management</h1>
        </div>

        <!-- Add Employee Form -->
        <form id="addEmployeeForm" class="mb-3">
            <div class="row">
                <div class="col-md-3">
                    <input type="text" id="name" class="form-control" placeholder="Name" required>
                </div>
                <div class="col-md-3">
                    <input type="number" id="mobile" class="form-control" placeholder="Mobile Number" required>
                </div>
                <div class="col-md-3">
                    <input type="number" id="salary" class="form-control" placeholder="Salary" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary">Add Employee</button>
                </div>
            </div>
        </form>

        <!-- Employee List -->
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTable">
                    <!-- Employee data will be inserted here dynamically -->
                </tbody>
            </table>
        </div>
    </div>
    <script>
       function goBack() {
            window.location.href = 'dashboard.html';
       }
       document.addEventListener("DOMContentLoaded", fetchEmployees);

let editMode = false;
let editEmployeeId = null;

document.getElementById("addEmployeeForm").addEventListener("submit", function (event) {
    event.preventDefault();

    const name = document.getElementById("name").value;
    const mobile = document.getElementById("mobile").value;
    const salary = document.getElementById("salary").value;

    const url = editMode
        ? `/update-employee/${editEmployeeId}`
        : "/add-employee";

    const method = editMode ? "PUT" : "POST";

    fetch(url, {
        method: method,
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ name, mobile, salary }),
    })
        .then(response => response.text())
        .then(() => {
            fetchEmployees(); // Fetch employees once after adding/updating
            resetForm();
        })
        .catch(error => console.error("Error:", error));
});

function fetchEmployees() {
    fetch("/get-employees")
        .then(response => response.json())
        .then(data => {
            const table = document.getElementById("employeeTable");
            table.innerHTML = "";
            data.forEach(employee => {
                table.innerHTML += `
                <tr>
                    <td>${employee.id}</td>
                    <td>${employee.name}</td>
                    <td>${employee.mobile}</td>
                    <td>${employee.salary}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editEmployee(${employee.id}, '${employee.name}', '${employee.mobile}', '${employee.salary}')">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${employee.id})">Delete</button>
                    </td>
                </tr>`;
            });
        })
        .catch(error => console.error("Error fetching employees:", error));
}

function deleteEmployee(id) {
    fetch(`/delete-employee/${id}`, { method: "DELETE" })
        .then(response => response.text())
        .then(() => fetchEmployees())
        .catch(error => console.error("Error deleting employee:", error));
}

function editEmployee(id, name, mobile, salary) {
    document.getElementById("name").value = name;
    document.getElementById("mobile").value = mobile;
    document.getElementById("salary").value = salary;

    editMode = true;
    editEmployeeId = id;

    document.querySelector("button[type='submit']").textContent = "Update Employee";
}

function resetForm() {
    document.getElementById("addEmployeeForm").reset();
    document.querySelector("button[type='submit']").textContent = "Add Employee";
    editMode = false;
    editEmployeeId = null;
}


    </script>
    
    
</body>
</html>
